ktor {
    deployment {
        port = 8080
        port = ${?PORT}
    }
    application {
        modules = [ com.aliadas.ApplicationKt.module ]
    }
}

jwt {
    secret = ${?JWT_SECRET}
    issuer = "aliadas-app"
    audience = "aliadas-users"
    realm = "aliadas"
}

database {
    url = ${?DATABASE_URL}
    driver = "com.mysql.cj.jdbc.Driver"
    user = ${?MYSQLUSER}
    password = ${?MYSQLPASSWORD}
}
